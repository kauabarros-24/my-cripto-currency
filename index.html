<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain · Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1a3a3a, #0a0f0f);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .terminal {
      background-color: #0c1215;
      width: 100%;
      max-width: 1000px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px #2a4f5f, inset 0 0 0 1px #3c6e80;
      padding: 20px;
      border: 1px solid #2a8faa;
    }

    .terminal-header {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e4f5f;
    }

    .terminal-header .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: #ff5f56;
      box-shadow: 0 0 5px #ff5f56;
    }
    .dot.yellow { background-color: #ffbd2e; box-shadow: 0 0 5px #ffbd2e; }
    .dot.green { background-color: #27c93f; box-shadow: 0 0 5px #27c93f; }

    .terminal-title {
      color: #9cd6e7;
      font-size: 0.95rem;
      letter-spacing: 1px;
      margin-left: 10px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .terminal-url {
      margin-left: auto;
      color: #5fb4b4;
      background: #0a1a22;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      border: 1px solid #1f6f7f;
      box-shadow: inset 0 1px 3px #000;
    }

    .terminal-output {
      background: #051015;
      border-radius: 12px;
      padding: 16px;
      min-height: 300px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #b0f0d0;
      border: 1px solid #1b4b55;
      box-shadow: inset 0 0 20px #00000080;
      scroll-behavior: smooth;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .terminal-output .prompt-line {
      color: #8dd0e0;
      margin: 4px 0;
    }

    .terminal-output .command {
      color: #f0f0a0;
    }

    .terminal-output .success {
      color: #a0e0a0;
    }

    .terminal-output .error {
      color: #ffa07a;
    }

    .terminal-input-area {
      display: flex;
      align-items: center;
      background: #0e1c24;
      border-radius: 40px;
      border: 1px solid #2d6b7f;
      padding: 4px 4px 4px 20px;
      margin-top: 20px;
      box-shadow: 0 0 0 1px #1b4450, inset 0 2px 5px #00000060;
    }

    .prompt-sign {
      color: #3ed0a0;
      font-weight: bold;
      font-size: 1.1rem;
      margin-right: 10px;
      text-shadow: 0 0 5px #3ed0a0;
    }

    #commandInput {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0f0f0;
      font-size: 1rem;
      padding: 14px 0;
      outline: none;
      font-family: inherit;
    }

    #commandInput::placeholder {
      color: #2e7080;
      font-style: italic;
      font-size: 0.9rem;
    }

    .enter-hint {
      color: #30859c;
      background: #0f2b33;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      letter-spacing: 0.8px;
      border: 1px solid #1b667a;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0e2630;
    }
    ::-webkit-scrollbar-thumb {
      background: #2d6b85;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="dot"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="terminal-title">blockchain@node ~/dashboard</span>
      <span class="terminal-url" id="currentUrlDisplay">http://127.0.0.1:8000</span>
    </div>

    <div class="terminal-output" id="output">
      <span class="prompt-line">👉 Blockchain Node Terminal</span>
      <span class="prompt-line">🌐 URL atual: http://127.0.0.1:8000</span>
      <span class="prompt-line">📌 Comandos: help, seturl, mine, chain, transaction, register, resolve, explain, clear</span>
    </div>

    <div class="terminal-input-area">
      <span class="prompt-sign">⧩</span>
      <input type="text" id="commandInput" placeholder="Digite um comando..." autofocus>
      <span class="enter-hint">⏎ ENTER</span>
    </div>
  </div>

  <script>
    let baseUrl = 'http://127.0.0.1:8000';
    const outputEl = document.getElementById('output');
    const commandInput = document.getElementById('commandInput');
    const urlDisplay = document.getElementById('currentUrlDisplay');

    function updateUrlDisplay() {
      urlDisplay.textContent = baseUrl;
    }

    function appendOutput(text, className = '') {
      const line = document.createElement('div');
      line.className = className || 'prompt-line';
      line.innerHTML = text.replace(/\n/g, '<br>');
      outputEl.appendChild(line);
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    function clearOutput() {
      outputEl.innerHTML = '';
      appendOutput('📟 Terminal limpo. Use help para comandos.');
    }

    function showApiResponse(promise, commandDescription) {
      appendOutput(`⏳ ${commandDescription} ...`, 'command');
      promise
        .then(async res => {
          if (!res.ok) {
            const errText = await res.text();
            throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
          }
          return res.json();
        })
        .then(data => {
          appendOutput('✅ Resposta:', 'success');
          appendOutput(JSON.stringify(data, null, 2), 'success');
        })
        .catch(err => {
          appendOutput(`❌ Erro: ${err.message}`, 'error');
        });
    }

    function processCommand(cmdLine) {
      const parts = cmdLine.trim().split(/\s+/);
      if (parts.length === 0) return;
      const cmd = parts[0].toLowerCase();

      if (cmd === 'help') {
        appendOutput('📋 <span class="command">Comandos disponíveis:</span>');
        appendOutput('  <span class="command">seturl  &lt;url&gt;</span>         → Define URL do nó');
        appendOutput('  <span class="command">mine</span>                    → Minera novo bloco');
        appendOutput('  <span class="command">chain</span>                   → Exibe cadeia');
        appendOutput('  <span class="command">transaction &lt;rem&gt; &lt;dest&gt; &lt;valor&gt;</span>');
        appendOutput('  <span class="command">register &lt;url&gt;</span>         → Registra nó vizinho');
        appendOutput('  <span class="command">resolve</span>                 → Executa consenso');
        appendOutput('  <span class="command">explain</span>                 → Explica blockchain');
        appendOutput('  <span class="command">clear</span>                   → Limpa tela');
        appendOutput('  <span class="command">help</span>                    → Mostra ajuda');
        return;
      }

      if (cmd === 'clear') {
        clearOutput();
        return;
      }

      if (cmd === 'seturl') {
        if (parts.length < 2) {
          appendOutput('❌ Uso: seturl <url> (ex: seturl http://localhost:5000)', 'error');
          return;
        }
        baseUrl = parts[1];
        updateUrlDisplay();
        appendOutput(`🌐 URL alterada para: ${baseUrl}`, 'success');
        return;
      }

      if (cmd === 'mine') {
        if (!baseUrl) return appendOutput('❌ Defina a URL primeiro.', 'error');
        showApiResponse(fetch(`${baseUrl}/mine`), 'minerando bloco');
        return;
      }

      if (cmd === 'chain') {
        if (!baseUrl) return appendOutput('❌ Defina a URL primeiro.', 'error');
        showApiResponse(fetch(`${baseUrl}/chain`), 'obtendo cadeia');
        return;
      }

      if (cmd === 'transaction') {
        if (!baseUrl) return appendOutput('❌ Defina a URL primeiro.', 'error');
        if (parts.length < 4) {
          appendOutput('❌ Uso: transaction <remetente> <destinatário> <valor>', 'error');
          return;
        }
        const sender = parts[1];
        const recipient = parts[2];
        const amount = parseFloat(parts[3]);
        if (isNaN(amount)) {
          appendOutput('❌ Valor inválido. Deve ser um número.', 'error');
          return;
        }
        showApiResponse(
          fetch(`${baseUrl}/transactions/new`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sender, recipient, amount })
          }),
          'enviando transação'
        );
        return;
      }

      if (cmd === 'register') {
        if (!baseUrl) return appendOutput('❌ Defina a URL primeiro.', 'error');
        if (parts.length < 2) {
          appendOutput('❌ Uso: register <url_do_nó>', 'error');
          return;
        }
        const node = parts[1];
        showApiResponse(
          fetch(`${baseUrl}/nodes/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nodes: [node] })
          }),
          'registrando nó vizinho'
        );
        return;
      }

      if (cmd === 'resolve') {
        if (!baseUrl) return appendOutput('❌ Defina a URL primeiro.', 'error');
        showApiResponse(fetch(`${baseUrl}/nodes/resolve`), 'executando consenso');
        return;
      }
      
      if (cmd === 'explain') {
        if (!baseUrl) return appendOutput('❌ Defina a URL primeiro.', 'error');
        showApiResponse(fetch(`${baseUrl}/generate/`), 'obtendo explicação blockchain');
        return;
      }

      appendOutput(`❌ Comando desconhecido: "${cmd}". Digite help para ver os comandos.`, 'error');
    }

    commandInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const rawCmd = commandInput.value.trim();
        if (rawCmd === '') return;

        appendOutput(`<span class="prompt-sign">⧩</span> <span class="command">${rawCmd}</span>`);
        processCommand(rawCmd);
        commandInput.value = '';
      }
    });

    updateUrlDisplay();
    commandInput.focus();
  </script>
</body>
</html>
