<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain Node Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1c24 0%, #1c3a4a 70%, #255b6b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .dashboard {
      max-width: 1200px;
      width: 100%;
      background: rgba(10, 25, 35, 0.6);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 span {
      background: linear-gradient(145deg, #a0e9ff, #5fb4e0);
      -webkit-background-text: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: #9bb8d4;
      margin-bottom: 32px;
      font-weight: 300;
      border-left: 4px solid #2f8eb0;
      padding-left: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(100, 200, 255, 0.3);
      box-shadow: 0 16px 30px rgba(0, 160, 255, 0.2);
    }

    .card h3 {
      font-weight: 400;
      margin-bottom: 18px;
      color: #b3e4ff;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.25rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }

    input:focus {
      border-color: #30b0ff;
      box-shadow: 0 0 0 3px rgba(48, 176, 255, 0.2);
    }

    input::placeholder {
      color: #7c95a8;
      font-weight: 300;
    }

    button {
      width: 100%;
      padding: 14px 18px;
      background: linear-gradient(115deg, #0066cc, #0099ff);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0, 120, 255, 0.3);
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    button:hover {
      background: linear-gradient(115deg, #1a7fe0, #3aaaff);
      box-shadow: 0 10px 20px rgba(0, 140, 255, 0.5);
      transform: scale(1.02);
    }

    button:active {
      transform: scale(0.98);
    }

    .output {
      background: #0a1118;
      border-radius: 28px;
      padding: 24px;
      border: 1px solid #2a4455;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 10px 30px rgba(0,0,0,0.5);
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: #99c6e9;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 0.85rem;
    }

    #output {
      background: #010a12;
      border-radius: 20px;
      padding: 20px;
      min-height: 260px;
      max-height: 400px;
      overflow: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #b4e0ff;
      border: 1px solid #1d4455;
      white-space: pre-wrap;
      word-break: break-word;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0e2630;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #2d6b85;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3f8fb0;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>
      <span>⛓️</span> Blockchain Node Dashboard
    </h1>
    <div class="sub">Controle e monitore nós da rede com requisições diretas</div>

    <div class="grid">
      <div class="card">
        <h3>🌐 Nó ativo</h3>
        <input type="url" id="url" placeholder="http://127.0.0.1:8000" value="http://127.0.0.1:8000">
      </div>

      <div class="card">
        <h3>⛏️ Minerar bloco</h3>
        <button onclick="mine()">Iniciar mineração</button>
      </div>

      <div class="card">
        <h3>💸 Nova transação</h3>
        <input id="sender" placeholder="Remetente (ex: address ou '0')">
        <input id="recipient" placeholder="Destinatário">
        <input id="amount" type="number" step="any" placeholder="Valor">
        <button onclick="newTransaction()">Enviar transação</button>
      </div>

      <div class="card">
        <h3>📡 Registrar nó vizinho</h3>
        <input id="nodeAddress" placeholder="http://127.0.0.1:5001">
        <button onclick="registerNode()">Adicionar nó</button>
      </div>

      <div class="card">
        <h3>📦 Cadeia completa</h3>
        <button onclick="getChain()">Exibir blockchain</button>
      </div>

      <div class="card">
        <h3>🤝 Consenso (resolver conflitos)</h3>
        <button onclick="resolve()">Sincronizar cadeia</button>
      </div>
    </div>

    <div class="output">
      <div class="output-header">
        <span>📟</span> Console de resposta
      </div>
      <div id="output">👈 Clique em um botão para ver a resposta do nó</div>
    </div>
  </div>

  <script>
    function getUrl() {
      return document.getElementById('url').value.trim();
    }

    async function showResponse(promise) {
      const output = document.getElementById('output');
      output.textContent = '⏳ Enviando requisição...';
      try {
        const res = await promise;
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = `❌ Erro de conexão: ${err.message}\n\nVerifique se a URL do nó está correta e acessível.`;
      }
    }

    function newTransaction() {
      const url = getUrl();
      if (!url) return alert('Informe a URL do nó');
      const sender = document.getElementById('sender').value.trim();
      const recipient = document.getElementById('recipient').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      if (!sender || !recipient || isNaN(amount)) {
        return alert('Preencha todos os campos da transação corretamente.');
      }
      showResponse(
        fetch(`${url}/transactions/new`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender, recipient, amount })
        })
      );
    }

    function mine() {
      const url = getUrl();
      if (!url) return alert('Informe a URL do nó');
      showResponse(fetch(`${url}/mine`));
    }

    function getChain() {
      const url = getUrl();
      if (!url) return alert('Informe a URL do nó');
      showResponse(fetch(`${url}/chain`));
    }

    function registerNode() {
      const url = getUrl();
      if (!url) return alert('Informe a URL do nó');
      const node = document.getElementById('nodeAddress').value.trim();
      if (!node) return alert('Digite o endereço do nó a ser registrado.');
      showResponse(
        fetch(`${url}/nodes/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nodes: [node] })
        })
      );
    }

    function resolve() {
      const url = getUrl();
      if (!url) return alert('Informe a URL do nó');
      showResponse(fetch(`${url}/nodes/resolve`));
    }
  </script>
</body>
</html>
